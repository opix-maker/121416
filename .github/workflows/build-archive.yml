name: Build Archive Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 1 */3 *'

permissions:
  contents: write

concurrency:
  group: snapshot-push
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository (shallow)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Archive Data
        id: build_step
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          BGM_USER_AGENT: ${{ secrets.BGM_USER_AGENT }}
          BUILD_TYPE: 'archive'
        run: node build_data.js

      - name: Clean up archive cache
        run: rm -rf .archive_cache

      - name: Snapshot commit and force push
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

          if [[ -z $(git status -s archive/) ]]; then
            echo "✅ No changes detected. Skipping push."
            exit 0
          fi

          echo "✅ Changes detected. Creating snapshot..."
          git checkout --orphan _snapshot
          git add -A
          git commit -m "snapshot: auto-update archive data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push -f origin _snapshot:main
          echo "✅ Snapshot pushed successfully."

      - name: Notify on failure
        if: failure() && steps.build_step.outcome == 'failure'
        uses: peter-evans/commit-comment@v3
        with:
          body: |
            :x: **Archive Data 构建失败!**

            `Build Archive Data` 工作流在执行时遇到错误。
            请检查最新的Actions运行日志以获取详细信息。

            @${{ github.repository_owner }}
